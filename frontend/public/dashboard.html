<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 0 16px; }
        h1 { font-size: 1.5rem; }
        .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
        button { padding: 10px 16px; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; }
        .primary { background: #2d6cdf; color: #fff; }
        .primary:hover { background: #2256bf; }
        .secondary { background: #16a085; color: #fff; }
        .secondary:hover { background: #128f76; }
        .logout { background: #c0392b; color: #fff; }
        .logout:hover { background: #a5311f; }
        .output { margin-top: 28px; padding: 16px; background: #f5f6f8; border-radius: 8px; min-height: 60px; white-space: pre-wrap; word-break: break-word; }
        .error { color: #c0392b; }
        .success { color: #1e8449; }
    </style>
</head>
<body>
    <h1>Dashboard</h1>
    <p>Voce esta autenticado. Use os botoes abaixo para testar os endpoints protegidos.</p>

    <div class="actions">
        <button class="primary" id="btnProtected">Testar endpoint protegido</button>
        <button class="secondary" id="btnProfile">Meu perfil</button>
        <button class="logout" id="btnLogout">Sair</button>
    </div>

    <div class="output" id="output">Aguardando acao...</div>

    <script>
        const token = sessionStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        const output = document.getElementById('output');

        function show(text, ok) {
            output.className = 'output ' + (ok ? 'success' : 'error');
            output.textContent = text;
        }

        async function callApi(path, label) {
            output.className = 'output';
            output.textContent = label + '...';
            try {
                const res = await fetch(path, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const contentType = res.headers.get('content-type') || '';
                const data = contentType.includes('application/json') ? await res.json() : await res.text();
                if (res.ok) {
                    show(typeof data === 'string' ? data : JSON.stringify(data, null, 2), true);
                } else {
                    const message = (data && (data.message || data.error)) || ('Falha (' + res.status + ')');
                    show(message, false);
                }
            } catch (err) {
                show('Erro de conexao com o servidor.', false);
            }
        }

        document.getElementById('btnProtected').addEventListener('click', () => {
            callApi('/api/protected', 'Chamando endpoint protegido');
        });

        document.getElementById('btnProfile').addEventListener('click', () => {
            callApi('/api/me', 'Buscando perfil');
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            sessionStorage.clear();
            window.location.href = '/';
        });
    </script>
</body>
</html>
